name: Build Cypher APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev uuid-dev
          
          # Install Rust compiler required for the cryptography package
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          
          # Add Rust (Cargo) to the GitHub environment path so Buildozer can use it
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          
          # Tell Rust to download the Android compilation targets
          $HOME/.cargo/bin/rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install Buildozer
        run: |
          pip3 install --user --upgrade pip setuptools packaging
          pip3 install --user --upgrade buildozer virtualenv "Cython==3.0.9" setuptools-rust

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cypher-Debug-APK
          path: bin/*.apk
